name: Terraform Staging

on:
  workflow_dispatch:
    inputs:
      action:
        description: Terraform action to run
        required: true
        type: choice
        options:
          - plan
          - apply

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-staging
  cancel-in-progress: false

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: staging
    defaults:
      run:
        shell: bash
        working-directory: infra/terraform/staging
    env:
      TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
      TF_VAR_public_api_domain: ${{ vars.TF_VAR_PUBLIC_API_DOMAIN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5.1.1
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=staging.tfplan

      - name: Upload plan artifact
        if: ${{ github.event.inputs.action == 'plan' }}
        uses: actions/upload-artifact@v4
        with:
          name: terraform-staging-plan
          path: infra/terraform/staging/staging.tfplan
          if-no-files-found: error
          retention-days: 7

      - name: Terraform Apply
        if: ${{ github.event.inputs.action == 'apply' }}
        run: terraform apply -auto-approve staging.tfplan

      - name: Export Terraform outputs
        if: ${{ github.event.inputs.action == 'apply' }}
        run: terraform output -json > outputs.json

      - name: Upload Terraform outputs
        if: ${{ github.event.inputs.action == 'apply' }}
        uses: actions/upload-artifact@v4
        with:
          name: terraform-staging-outputs
          path: infra/terraform/staging/outputs.json
          if-no-files-found: error
          retention-days: 7
